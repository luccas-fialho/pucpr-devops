name: Continuous Delivery
on:
  push:
    branches:
      - main
jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Continuous Delivery Simulation
        uses: actions/upload-artifact@v4
        with:
          name: classnotes
          path: '**/*.md'
